<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(주)휴먼인텍 메시지 생성기</title>
    <style>
        :root {
            --primary-color: #008744;
            --primary-light: #f0fdf4;
            --border-color: #cbd5e1;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f8fafc; margin: 0; padding: 20px; color: var(--text-main); display: flex; justify-content: center; }
        .main-wrapper { max-width: 1100px; width: 100%; display: flex; flex-direction: column; gap: 15px; }

        .nav-tabs { display: flex; border-bottom: 2px solid var(--border-color); padding-bottom: 4px; }
        .nav-btn { padding: 8px 16px; background: none; border: none; font-size: 15px; font-weight: 700; color: var(--text-muted); cursor: pointer; }
        .nav-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); }

        .channel-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 5px; }
        .channel-card { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .channel-card.active { border: 2px solid var(--primary-color); background-color: var(--primary-light); }
        .channel-card h3 { margin: 0 0 4px 0; font-size: 15px; font-weight: 700; }
        .channel-card.active h3 { color: var(--primary-color); }
        .channel-card p { margin: 0; font-size: 12px; color: var(--text-muted); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .section-card { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .section-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-top: 0; margin-bottom: 12px; }

        input[type="text"], select, textarea { width: 100%; padding: 11px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; outline: none; }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--primary-color); }

        .segment-control { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .segment-btn { background: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 9px; font-size: 14px; cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .segment-btn.active { border: 1px solid var(--primary-color); color: var(--primary-color); background: var(--primary-light); }

        .situation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .situation-card { background: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 11px; cursor: pointer; transition: all 0.15s; }
        .situation-card.active { border: 2px solid var(--primary-color); background: var(--primary-light); }
        .situation-card h4 { margin: 0 0 2px 0; font-size: 13px; font-weight: 700; }
        .situation-card.active h4 { color: var(--primary-color); }
        .situation-card p { margin: 0; font-size: 11px; color: var(--text-muted); }

        .extra-info-box { border: 1px solid var(--primary-color); background-color: var(--primary-light); border-radius: 12px; padding: 14px; margin-bottom: 15px; }
        .extra-info-box label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--primary-color); }

        .btn-submit { width: 100%; padding: 13px; background-color: var(--primary-color); color: #fff; font-size: 15px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; }
        .btn-submit:hover { background-color: #006e36; }

        .result-container { display: flex; flex-direction: column; min-height: 600px; }
        .result-area-wrapper { position: relative; flex-grow: 1; display: flex; flex-direction: column; }
        textarea.result-display { width: 100%; flex-grow: 1; min-height: 460px; border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.7; resize: none; }
        .btn-copy { position: absolute; top: 10px; right: 10px; padding: 6px 12px; background-color: #475569; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }

        .byte-badge { margin-top: 8px; font-size: 12px; font-weight: 600; text-align: right; color: var(--text-muted); }
        .notice-banner { margin-top: 10px; background-color: var(--primary-light); border: 1px solid var(--primary-color); border-radius: 8px; padding: 10px; font-size: 12px; color: var(--primary-color); font-weight: 600; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; display: none; z-index: 999; }

        #settingsPage { display: none; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .settings-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .settings-section:last-child { border-bottom: none; margin-bottom: 0; }
        .settings-section-title { font-size: 15px; font-weight: 700; margin: 0 0 4px 0; }
        .settings-section-desc { font-size: 12px; color: var(--text-muted); margin: 0 0 14px 0; }

        .sup-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f8fafc; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 6px; }
        .sup-item span:first-child { flex: 1; font-size: 14px; font-weight: 600; }
        .sup-item .sup-phone { color: var(--text-muted); font-size: 13px; }
        .sup-del-btn { padding: 4px 10px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; color: #dc2626; font-size: 12px; font-weight: 600; }
        .sup-add-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; margin-top: 10px; }
        .btn-add-sup { padding: 11px 16px; background: var(--primary-color); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px; white-space: nowrap; }
    </style>
</head>

<div class="main-wrapper">

let currentTemplates = JSON.parse(localStorage.getItem('ht_final_sms_templates')) || defaultTemplates;

// ─── 유틸 ────────────────────────────────────────────────────────────────────
function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 1800);
}

// ─── 페이지 전환 ──────────────────────────────────────────────────────────────
function switchPage(page) {
    const isGen = page === 'generator';
    document.getElementById('generatorPage').style.display = isGen ? 'block' : 'none';
    document.getElementById('settingsPage').style.display  = isGen ? 'none'  : 'block';
    document.getElementById('navGen').classList.toggle('active', isGen);
    document.getElementById('navSet').classList.toggle('active', !isGen);
    if (isGen) { renderSituationGrid(); }
    else       { renderSupervisorList(); loadTemplateToEdit(); }
}

// ─── 채널 ────────────────────────────────────────────────────────────────────
function selectChannel(channel, el) {
    selectedChannel = channel;
    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const banner = document.getElementById('infoBanner');
    banner.innerText = channel === '문자'
        ? 'TIP. 화~목 오전 9~11시 문자 발송 시 응답률이 가장 높습니다.'
        : 'TIP. [확인중] / [나중에 연락] 등 짧은 회신 선택지를 주면 답장률이 올라갑니다.';
    generateMessage();
}

// ─── 계약 유형 ───────────────────────────────────────────────────────────────
function selectSegment(type, el) {
    selectedType = type;
    document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    generateMessage();
}

// ─── 상황 카드 ───────────────────────────────────────────────────────────────
function renderSituationGrid() {
    const grid = document.getElementById('situationGrid');
    grid.innerHTML = '';
    situations.forEach(sit => {
        const card = document.createElement('div');
        card.className = 'situation-card' + (sit.id === selectedStep ? ' active' : '');
        card.onclick = () => selectStep(sit.id, card);
        card.innerHTML = `<h4>${sit.title}</h4><p>${sit.desc}</p>`;
        grid.appendChild(card);
    });
}

function selectStep(stepId, el) {
    selectedStep = stepId;
    document.querySelectorAll('.situation-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    updateExtraFields();
    generateMessage();
}

// ─── 동적 추가 필드 ──────────────────────────────────────────────────────────
function updateExtraFields() {
    const box = document.getElementById('extraInfoBox');
    if (selectedStep === 'step5') {
        box.style.display = 'block';
        const opts = supervisors.map(s =>
            `<option value="${s.name} / ${s.phone}">${s.name} (${s.phone})</option>`).join('');
        box.innerHTML = `
            <div style="margin-bottom:10px;">
                <label>방문 날짜 및 시간</label>
                <input type="text" id="extra1" placeholder="예) 7/15(월) 오전 10시" oninput="generateMessage()">
            </div>
            <div style="margin-bottom:0;">
                <label>현장 담당 소장님 선택</label>
                <select id="extra2" onchange="generateMessage()">${opts}</select>
            </div>`;
    } else if (selectedStep === 'step6') {
        box.style.display = 'block';
        box.innerHTML = `
            <div style="margin-bottom:10px;">
                <label>배송 수단 (수정 가능)</label>
                <input type="text" id="extra1" value="우체국택배" oninput="generateMessage()">
            </div>
            <div style="margin-bottom:0;">
                <label>송장번호</label>
                <input type="text" id="extra2" placeholder="예) 1234567890123" oninput="generateMessage()">
            </div>`;
    } else {
        box.style.display = 'none';
    }
}

// ─── 메시지 생성 ─────────────────────────────────────────────────────────────
function generateMessage() {
    const cName = document.getElementById('clientName').value.trim() || '담당자';
    const sName = document.getElementById('siteName').value.trim()   || '[현장명]';
    const ex1El = document.getElementById('extra1');
    const ex2El = document.getElementById('extra2');
    const ex1 = ex1El ? ex1El.value.trim() : '';
    const ex2 = ex2El ? ex2El.value.trim() : '';

    const tmpl = currentTemplates[selectedStep];
    if (!tmpl) return;
    const base = tmpl[selectedChannel] || '';

    const text = base
        .replace(/\[담당자\]/g, cName)
        .replace(/\[현장명\]/g, sName)
        .replace(/\[유형\]/g, selectedType)
        .replace(/\[추가1\]/g, ex1 || '[값1 입력 필요]')
        .replace(/\[추가2\]/g, ex2 || '[값2 입력 필요]');

    document.getElementById('resultArea').value = text;
    updateByteCount(text);
}

// ─── 바이트 표시 (경고 없음) ─────────────────────────────────────────────────
function updateByteCount(str) {
    let bytes = 0;
    for (let i = 0; i < str.length; i++) bytes += str.charCodeAt(i) > 127 ? 2 : 1;
    const el = document.getElementById('byteCounter');
    el.innerText = selectedChannel === '문자'
        ? `${bytes} Byte · ${str.length}자 (${bytes > 90 ? 'LMS 장문' : 'SMS 단문'})`
        : `${str.length}자`;
}

// ─── 입력값 저장 ─────────────────────────────────────────────────────────────
function saveInputs() {
    localStorage.setItem('ht_saved_cname', document.getElementById('clientName').value);
    localStorage.setItem('ht_saved_sname', document.getElementById('siteName').value);
    generateMessage();
}
function loadSavedInputs() {
    const cn = localStorage.getItem('ht_saved_cname');
    const sn = localStorage.getItem('ht_saved_sname');
    if (cn) document.getElementById('clientName').value = cn;
    if (sn) document.getElementById('siteName').value   = sn;
}

// ─── 복사 ────────────────────────────────────────────────────────────────────
async function copyText() {
    const val = document.getElementById('resultArea').value;
    if (!val) return;
    try { await navigator.clipboard.writeText(val); }
    catch (e) { document.getElementById('resultArea').select(); document.execCommand('copy'); }
    showToast('📋 클립보드에 복사되었습니다!');
}

// ─── 템플릿 편집 ─────────────────────────────────────────────────────────────
const sel = document.getElementById('editStepSelect');
situations.forEach(sit => {
    const opt = document.createElement('option');
    opt.value = sit.id; opt.innerText = sit.title;
    sel.appendChild(opt);
});
function loadTemplateToEdit() {
    const step = document.getElementById('editStepSelect').value;
    document.getElementById('editSms').value   = currentTemplates[step]?.['문자'] || '';
    document.getElementById('editKakao').value = currentTemplates[step]?.['카톡'] || '';
}
function saveTemplates() {
    const step = document.getElementById('editStepSelect').value;
    if (!currentTemplates[step]) currentTemplates[step] = {};
    currentTemplates[step]['문자'] = document.getElementById('editSms').value;
    currentTemplates[step]['카톡'] = document.getElementById('editKakao').value;
    localStorage.setItem('ht_final_sms_templates', JSON.stringify(currentTemplates));
    showToast('💾 템플릿이 저장되었습니다!');
}

// ─── 소장 관리 ───────────────────────────────────────────────────────────────
function renderSupervisorList() {
    const el = document.getElementById('supervisorList');
    if (!el) return;
    el.innerHTML = supervisors.length === 0
        ? '<p style="font-size:13px;color:var(--text-muted);margin:0 0 8px;">등록된 소장님이 없습니다.</p>'
        : supervisors.map((s, i) => `
            <div class="sup-item">
                <span>${s.name}</span>
                <span class="sup-phone">${s.phone}</span>
                <button class="sup-del-btn" onclick="deleteSupervisor(${i})">삭제</button>
            </div>`).join('');
}
function addSupervisor() {
    const name  = document.getElementById('newSupName').value.trim();
    const phone = document.getElementById('newSupPhone').value.trim();
    if (!name || !phone) { showToast('⚠️ 성함과 연락처를 모두 입력해주세요.'); return; }
    supervisors.push({ name, phone });
    localStorage.setItem('ht_supervisors', JSON.stringify(supervisors));
    document.getElementById('newSupName').value = '';
    document.getElementById('newSupPhone').value = '';
    renderSupervisorList();
    showToast('👷 소장님이 추가되었습니다.');
}
function deleteSupervisor(i) {
    if (supervisors.length <= 1) { showToast('⚠️ 최소 1명이 있어야 합니다.'); return; }
    supervisors.splice(i, 1);
    localStorage.setItem('ht_supervisors', JSON.stringify(supervisors));
    renderSupervisorList();
    showToast('삭제되었습니다.');
}

// ─── 초기화 ──────────────────────────────────────────────────────────────────
renderSituationGrid();
loadSavedInputs();
updateExtraFields();
generateMessage();
</script>
</body>
</html>
