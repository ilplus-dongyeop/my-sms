<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장별 맞춤 메시지 생성기</title>
    <style>
        :root {
            --primary-color: #008744;
            --primary-light: #f0fdf4;
            --border-color: #cbd5e1;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        * {
            box-shadow: none;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f8fafc;
            margin: 0;
            padding: 24px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }
        .main-wrapper {
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 상단 채널 선택 탭 */
        .channel-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .channel-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .channel-card.active {
            border: 2px solid var(--primary-color);
            background-color: var(--primary-light);
        }
        .channel-card h3 {
            margin: 0 0 4px 0;
            font-size: 15px;
            font-weight: 700;
        }
        .channel-card.active h3 { color: var(--primary-color); }
        .channel-card p {
            margin: 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 하단 2단 대시보드 레이아웃 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .section-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 14px;
        }

        /* 인풋 스타일 */
        .form-group { margin-bottom: 12px; }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary-color); }

        /* 세그먼트 컨트롤 버튼 (렌탈/구매/미정) */
        .segment-control {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .segment-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
        }
        .segment-btn.active {
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            background: var(--primary-light);
        }

        /* 12개 상황 선택 그리드 크기 */
        .situation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .situation-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .situation-card.active {
            border: 2px solid var(--primary-color);
            background: var(--primary-light);
        }
        .situation-card h4 {
            margin: 0 0 4px 0;
            font-size: 13px;
            font-weight: 700;
        }
        .situation-card.active h4 { color: var(--primary-color); }
        .situation-card p {
            margin: 0;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 추가 정보 동적 박스 */
        .extra-info-box {
            border: 1px solid var(--primary-color);
            background-color: var(--primary-light);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .extra-info-box label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--primary-color);
        }

        /* 대형 생성 버튼 */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-submit:hover { background-color: #006e36; }

        /* 우측 결과창 영역 */
        .result-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 650px;
        }
        .result-area-wrapper {
            position: relative;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        textarea.result-display {
            width: 100%;
            flex-grow: 1;
            min-height: 520px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            background-color: #fff;
        }
        .btn-copy {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            background-color: #475569;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .notice-banner {
            margin-top: 12px;
            background-color: var(--primary-light);
            border: 1px solid var(--primary-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 600;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- 1. 상단 채널 탭 -->
    <div class="channel-container">
        <div class="channel-card active" onclick="selectChannel('문자', this)">
            <h3>📱 문자 SMS</h3>
            <p>90자 이내 권장</p>
        </div>
        <div class="channel-card" onclick="selectChannel('카톡', this)">
            <h3>💬 카카오톡</h3>
            <p>250자 이내 권장</p>
        </div>
        <div class="channel-card" onclick="selectChannel('이메일', this)">
            <h3>✉️ 이메일</h3>
            <p>서면 포함 형식</p>
        </div>
    </div>

    <!-- 2. 하단 대시보드 그리드 -->
    <div class="dashboard-grid">
        <!-- 좌측 컨트롤 패널 -->
        <div class="left-panel">
            <!-- 기본 정보 -->
            <div class="section-card">
                <h3 class="section-title">기본 정보</h3>
                <div class="form-group">
                    <input type="text" id="managerName" placeholder="담당자 성함 (예: 홍길동)">
                </div>
                <div class="form-group">
                    <input type="text" id="siteName" placeholder="현장명 (예: ○○아파트 신축공사)">
                </div>
                <div class="segment-control">
                    <button class="segment-btn active" onclick="selectSegment('렌탈', this)">렌탈</button>
                    <button class="segment-btn" onclick="selectSegment('구매', this)">구매</button>
                    <button class="segment-btn" onclick="selectSegment('미정', this)">미정</button>
                </div>
            </div>

            <!-- 상황 선택 (12가지 카드) -->
            <div class="section-card">
                <h3 class="section-title">상황 선택</h3>
                <div class="situation-grid" id="situationGrid">
                    <!-- 스크립트에서 자동 생성 또는 마크업 하드코딩 가능 -->
                </div>
            </div>

            <!-- 추가 정보 박스 (상황에 따라 동적 변경) -->
            <div class="extra-info-box" id="extraInfoBox">
                <!-- 내부 입력창은 스크립트가 동적으로 밀어넣어 줍니다 -->
            </div>

            <!-- 생성 버튼 -->
            <button class="btn-submit" onclick="generateMessage()">📝 메시지 생성</button>
        </div>

        <!-- 우측 결과 창 패널 -->
        <div class="right-panel">
            <div class="section-card result-container">
                <h3 class="section-title">생성된 메시지</h3>
                <div class="result-area-wrapper">
                    <button class="btn-copy" onclick="copyText()">📋 복사하기</button>
                    <textarea id="resultArea" class="result-display" placeholder="좌측 정보를 입력하고 [메시지 생성] 버튼을 누르시면 이 자리에 초안이 깔끔하게 완성됩니다!"></textarea>
                </div>
                <div class="notice-banner">
                    ⓘ 90자가 넘으면 장문(MMS)으로 발송돼 비용이 달라져요. 길어지면 카카오톡으로 전환하세요.
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast">클립보드에 안전하게 복사되었습니다!</div>

<script>
    let selectedChannel = '문자';
    let selectedType = '렌탈';
    let selectedStep = 'step7'; // 기본값: 사진속 '설치 일정 안내'

    // 사진 속 12가지 상황 완벽 데이터 리스트 정의
    const situations = [
        { id: 'step1', title: '견적서 발송 직후', desc: '메일 확인 요청' },
        { id: 'step2', title: '견적 D+3 팔로업', desc: '수령 확인 + 문의 여부' },
        { id: 'step3', title: '견적 D+7 + 네고 가능', desc: '타사 비교 중 전환 유도' },
        { id: 'step4', title: '공제회 안내대상 첫 연락', desc: '견적 수령 확인' },
        { id: 'step5', title: '공제회 안내대상 D+3', desc: '재확인 + 전환 유도' },
        { id: 'step6', title: '계약 확정', desc: '확정 + 절차 안내' },
        { id: 'step7', title: '설치 일정 안내', desc: '방문 날짜·기사 공유' },
        { id: 'step8', title: '출고 확정 + 송장번호', desc: '출고일·송장 공유' },
        { id: 'step9', title: '설치 완료 확인', desc: '완료 확인 + AS 안내' },
        { id: 'step10', title: '타사 비교 중 ➔ 전환', desc: '경쟁사 대비 우위 어필' },
        { id: 'step11', title: '장기 미응답 재접속', desc: '2주 이상 연락 두절' },
        { id: 'step12', title: '직접 입력', desc: '기타 상황 자유 입력' }
    ];

    // 황금 문구 데이터베이스 사전 정의 (\n 줄바꿈 처리 완성)
    const templates = {
        step7: {
            '문자': "[설치 일정 안내]\n안녕하세요 [담당자]님, 요청하신 [현장명](계약유형: [유형])의 설치 일정이 [추가1]로 확정되었습니다.\n당일 배정된 [추가2]가 방문 전 연락드린 후 안전하게 조치하겠습니다.",
            '카톡': "🚚 [현장명] 설치 일정 안내\n\n안녕하세요, [담당자]님! 😊\n\n믿고 맡겨주신 [현장명]의 설치 일정을 안내해 드립니다.\n\n■ 방문 날짜: [추가1]\n■ 담당 기사: [추가2]\n\n당일 기사님이 방문 전에 다시 연락드리고 깔끔하게 처리해 드리겠습니다. 다른 문의사항이 있으시면 언제든 톡 남겨주세요!",
            '이메일': "제목: [안내] [현장명] 설치 일정 및 배정 기사 안내의 건\n\n안녕하십니까, [담당자]님.\n\n귀사에서 진행하시는 [현장명] 건의 최종 시공 및 설치 일정이 확정되어 아래와 같이 전해드립니다.\n\n1. 현장명: [현장명] ([유형])\n2. 설치 일시: [추가1]\n3. 배정 담당자: [추가2]\n\n예정된 일정에 차질 없이 마칠 수 있도록 만전을 기하겠습니다. 감사합니다."
        },
        step1: {
            '문자': "[견적서 확인 요청]\n안녕하세요 [담당자]님, 조금 전 요청하신 [현장명] 견적서를 메일로 발송해 드렸습니다. 확인 부탁드립니다.",
            '카톡': "📄 견적서 발송 안내\n\n안녕하세요 [담당자]님! 요청하신 [현장명] 견적서를 메일로 보내드렸습니다. 검토 후 의견 조율 필요하시면 편히 말씀해 주세요! 😊",
            '이메일': "제목: [견적서] [현장명] 관련 견적서 발송의 건\n\n안녕하십니까 [담당자]님.\n요청하신 [현장명] 관련 최적의 견적 내역을 첨부 파일로 발송하오니 검토 부탁드립니다."
        },
        step2: {
            '문자': "[견적 확인] 안녕하세요 [담당자]님, 며칠 전 보내드린 [현장명] 견적서는 잘 받아보셨을까요? 궁금하신 점 있으시면 연락 주세요.",
            '카톡': "🤔 견적서 수령 확인\n\n안녕하세요 [담당자]님! [현장명] 견적서 발송 후 검토 단계에 도움을 드리고자 연락드렸습니다. 궁금증이나 사양 변경이 필요하시면 톡 주세요!",
            '이메일': "제목: [확인요청] [현장명] 견적서 검토 리마인드\n\n안녕하십니까 [담당자]님, 며칠 전 발송해 드린 견적서 검토 중 애로사항이나 추가 반영할 내용이 있으신지 정중히 여쭙니다."
        },
        step3: {
            '문자': "[네고 가능 안내] [현장명] 견적 비교 중이실 텐데 결정 전 말씀해 주시면 자재 스펙 유지 조건 하에 최대한 네고 조율해 드리겠습니다.",
            '카톡': "👍 [현장명] 합리적 계약 제안\n\n담당자님 타사 비교 중이실 텐데요! 최종 조율 단계에서 단가 맞춤(네고) 가능성이 열려있으니 확정 전 꼭 톡 주세요! 😉",
            '이메일': "제목: [단가협의] [현장명] 최종 견적 단가 네고 조율 제안\n\n안녕하십니까 [담당자]님, 타사 견적 대비 경쟁력 있는 추가 네고 및 혜택 조율이 가능하여 긴급히 서면으로 제안을 드립니다."
        },
        step8: {
            '문자': "[출고 완료 안내]\n[현장명] 자재가 정상 출고되었습니다.\n■ 배송/화물: [추가1]\n■ 송장/연락처: [추가2]",
            '카톡': "📦 [현장명] 출고 및 배송 안내\n\n담당자님 주문하신 자재가 오늘 안전하게 출고되었습니다!\n\n■ 배송정보: [추가1]\n■ 송장번호: [추가2]\n\n도착 시 파손 여부를 꼭 확인해 주세요! 🎉",
            '이메일': "제목: [안내] [현장명] 계약 자재 출고 정보 및 인수증 안내\n\n안녕하십니까 [담당자]님, 발주가 확정된 [현장명] 물품 배송 정보를 공유해 드립니다.\n\n- 배송편: [추가1]\n- 송장내역: [추가2]"
        }
    };

    //머리아픈 나머지 단계들도 공통 폴백 처리로 깨짐 방지
    function getTemplate(step, channel) {
        if(templates[step] && templates[step][channel]) {
            return templates[step][channel];
        }
        return `[${situations.find(s=>s.id===step).title}]\n안녕하세요 [담당자]님, [현장명]([유형]) 진행 건 관련하여 연락드렸습니다. 편하신 시간에 확인 및 피드백 부탁드립니다. 감사합니다.`;
    }

    // 12가지 상황 카드 그리기 실행
    const gridEl = document.getElementById('situationGrid');
    situations.forEach(sit => {
        const card = document.createElement('div');
        card.className = `situation-card ${sit.id === selectedStep ? 'active' : ''}`;
        card.onclick = () => selectStep(sit.id, card);
        card.innerHTML = `<h4>${sit.title}</h4><p>${sit.desc}</p>`;
        gridEl.appendChild(card);
    });

    function selectChannel(channel, el) {
        selectedChannel = channel;
        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        updateExtraFields();
    }

    function selectSegment(type, el) {
        selectedType = type;
        document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function selectStep(stepId, el) {
        selectedStep = stepId;
        document.querySelectorAll('.situation-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        updateExtraFields();
    }

    // 상황 선택에 따라 하단 인풋박스가 동적으로 변함
    function updateExtraFields() {
        const box = document.getElementById('extraInfoBox');
        if (selectedStep === 'step7') {
            box.style.display = 'block';
            box.innerHTML = `
                <div class="form-group">
                    <label>방문 날짜</label>
                    <input type="text" id="extra1" placeholder="예) 7/15(월) 오전 10시">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>담당 기사 (선택)</label>
                    <input type="text" id="extra2" placeholder="예) 홍길동 기사">
                </div>
            `;
        } else if (selectedStep === 'step8') {
            box.style.display = 'block';
            box.innerHTML = `
                <div class="form-group">
                    <label>택배사 / 화물 수단</label>
                    <input type="text" id="extra1" placeholder="예) 경동택배">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>송장번호 / 기사 연락처</label>
                    <input type="text" id="extra2" placeholder="예) 302-1234-5678">
                </div>
            `;
        } else if (selectedStep === 'step12') {
            box.style.display = 'block';
            box.innerHTML = `
                <div class="form-group" style="margin-bottom:0;">
                    <label>기타 특이사항 직접 기술</label>
                    <input type="text" id="extra1" placeholder="텍스트 변환용 커스텀 입력창 내용">
                </div>
            `;
        } else {
            // 다른 단계들은 추가 입력 데이터가 불필요하므로 숨김
            box.style.display = 'none';
        }
    }

    function generateMessage() {
        const mName = document.getElementById('managerName').value || "[담당자 성함]";
        const sName = document.getElementById('siteName').value || "[현장명]";
        
        const ex1El = document.getElementById('extra1');
        const ex2El = document.getElementById('extra2');
        const ex1 = ex1El ? ex1El.value : "";
        const ex2 = ex2El ? ex2El.value : "";

        let baseTemplate = getTemplate(selectedStep, selectedChannel);

        let finalText = baseTemplate
            .replace(/\[담당자\]/g, mName)
            .replace(/\[현장명\]/g, sName)
            .replace(/\[유형\]/g, selectedType)
            .replace(/\[추가1\]/g, ex1 || "[입력 필요]")
            .replace(/\[추가2\]/g, ex2 || "[입력 필요]");

        document.getElementById('resultArea').value = finalText;
    }

    function copyText() {
        const area = document.getElementById('resultArea');
        if(!area.value) return;
        area.select();
        document.execCommand('copy');
        
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1800);
    }

    // 초기 로드 시 7번 필드 노출
    updateExtraFields();
</script>
</body>
</html>
