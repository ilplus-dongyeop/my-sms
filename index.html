<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(주)휴먼인텍 문자 생성기</title>
    <style>
        :root {
            --primary-color: #008744;
            --primary-light: #f0fdf4;
            --border-color: #cbd5e1;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --warning-color: #e11d48;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f8fafc; margin: 0; padding: 20px; color: var(--text-main); display: flex; justify-content: center; }
        .main-wrapper { max-width: 1100px; width: 100%; display: flex; flex-direction: column; gap: 15px; }
        
        .nav-tabs { display: flex; justify-content: space-between; border-bottom: 2px solid var(--border-color); padding-bottom: 4px; }
        .nav-left { display: flex; gap: 10px; }
        .nav-btn { padding: 8px 16px; background: none; border: none; font-size: 15px; font-weight: 700; color: var(--text-muted); cursor: pointer; }
        .nav-btn.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); }

        .channel-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 5px; }
        .channel-card { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .channel-card.active { border: 2px solid var(--primary-color); background-color: var(--primary-light); }
        .channel-card h3 { margin: 0 0 4px 0; font-size: 15px; font-weight: 700; }
        .channel-card.active h3 { color: var(--primary-color); }
        .channel-card p { margin: 0; font-size: 12px; color: var(--text-muted); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .section-card { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .section-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-top: 0; margin-bottom: 12px; }

        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 11px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; outline: none; }
        input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus { border-color: var(--primary-color); }

        .segment-control { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .segment-btn { background: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 9px; font-size: 14px; cursor: pointer; font-weight: 600; color: var(--text-muted); }
        .segment-btn.active { border: 1px solid var(--primary-color); color: var(--primary-color); background: var(--primary-light); }

        .situation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .situation-card { background: #fff; border: 1px solid var(--border-color); border-radius: 8px; padding: 11px; cursor: pointer; transition: all 0.15s; }
        .situation-card.active { border: 2px solid var(--primary-color); background: var(--primary-light); }
        .situation-card h4 { margin: 0 0 2px 0; font-size: 13px; font-weight: 700; }
        .situation-card.active h4 { color: var(--primary-color); }
        .situation-card p { margin: 0; font-size: 11px; color: var(--text-muted); }

        .extra-info-box { border: 1px solid var(--primary-color); background-color: var(--primary-light); border-radius: 12px; padding: 14px; margin-bottom: 15px; }
        .extra-info-box label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--primary-color); }

        .btn-submit { width: 100%; padding: 13px; background-color: var(--primary-color); color: #fff; font-size: 15px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; }
        .btn-submit:hover { background-color: #006e36; }

        .result-container { display: flex; flex-direction: column; min-height: 560px; }
        .result-area-wrapper { position: relative; flex-grow: 1; display: flex; flex-direction: column; }
        textarea.result-display { width: 100%; flex-grow: 1; min-height: 420px; border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.6; resize: none; }
        .btn-copy { position: absolute; top: 10px; right: 10px; padding: 6px 12px; background-color: #475569; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
        
        .byte-badge { margin-top: 8px; font-size: 12px; font-weight: 600; text-align: right; color: var(--text-muted); }
        .byte-badge.warning { color: var(--warning-color); }
        .notice-banner { margin-top: 10px; background-color: var(--primary-light); border: 1px solid var(--primary-color); border-radius: 8px; padding: 10px; font-size: 12px; color: var(--primary-color); font-weight: 600; }
        .notice-banner.danger { background-color: #fff1f2; border-color: var(--warning-color); color: var(--warning-color); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; display: none; z-index: 999; }
        
        #settingsPage { display: none; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="nav-tabs">
        <div class="nav-left">
            <button id="navGen" class="nav-btn active" onclick="switchPage('generator')">📱 메시지 생성기</button>
            <button id="navSet" class="nav-btn" onclick="switchPage('settings')">⚙️ 템플릿 설정</button>
        </div>
    </div>

    <!-- 생성기 페이지 -->
    <div id="generatorPage">
        <div class="channel-container">
            <div class="channel-card active" id="tab-SMS" onclick="selectChannel('문자', this)">
                <h3>📱 문자 SMS</h3><p>90자 이내 권장</p>
            </div>
            <div class="channel-card" id="tab-KKO" onclick="selectChannel('카톡', this)">
                <h3>💬 카카오톡</h3><p>250자 이내 권장</p>
            </div>
            <div class="channel-card" id="tab-EML" onclick="selectChannel('이메일', this)">
                <h3>✉️ 이메일</h3><p>서면 포함 형식</p>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="left-panel">
                <div class="section-card">
                    <h3 class="section-title">기본 정보</h3>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <input type="text" id="clientName" placeholder="상대방 담당자 성함/직함 (공란 시 '담당자님' 자동 치환)" oninput="saveInputs()">
                    </div>
                    <div class="form-group">
                        <input type="text" id="siteName" placeholder="현장명 (공란 시 본문에서 자동 공백 처리)" oninput="saveInputs()">
                    </div>
                    <div class="segment-control">
                        <button class="segment-btn active" onclick="selectSegment('렌탈', this)">렌탈</button>
                        <button class="segment-btn" onclick="selectSegment('구매', this)">구매</button>
                        <button class="segment-btn" onclick="selectSegment('미정', this)">미정</button>
                    </div>
                </div>

                <div class="section-card">
                    <h3 class="section-title">상황 선택</h3>
                    <div class="situation-grid" id="situationGrid"></div>
                </div>

                <div class="extra-info-box" id="extraInfoBox"></div>
                <button class="btn-submit" onclick="generateMessage()">⚡ 메시지 초안 생성</button>
            </div>

            <div class="right-panel">
                <div class="section-card result-container">
                    <h3 class="section-title">생성된 메시지</h3>
                    <div class="result-area-wrapper">
                        <button class="btn-copy" onclick="copyText()">📋 복사하기</button>
                        <textarea id="resultArea" class="result-display" readonly placeholder="좌측 정보를 채우고 생성 버튼을 누르세요."></textarea>
                    </div>
                    <div class="byte-badge" id="byteCounter">0 / 90 Byte (SMS)</div>
                    <div class="notice-banner" id="infoBanner">ⓘ 90바이트가 넘으면 장문(LMS)으로 전환되어 발송 비용이 달라질 수 있습니다.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 템플릿 설정 페이지 -->
    <div id="settingsPage">
        <h3 style="margin:0 0 5px 0; font-size:16px;">⚙️ 양식 문구 편집 커스터마이징</h3>
        <p style="margin:0 0 15px 0; font-size:12px; color:var(--text-muted);">코드 치환 단어: [담당자], [현장명], [유형], [추가1], [추가2]</p>
        <div class="form-group" style="margin-bottom:12px;">
            <label style="font-weight:700; font-size:13px;">편집할 상황 선택</label>
            <select id="editStepSelect" onchange="loadTemplateToEdit()" style="margin-top:4px;"></select>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
            <label style="color:var(--primary-color); font-weight:700; font-size:13px;">📱 문자 양식</label>
            <textarea id="editSms" style="height:120px; font-family:inherit; margin-top:4px; line-height:1.5;"></textarea>
        </div>
        <div class="form-group" style="margin-bottom:15px;">
            <label style="color:#2563eb; font-weight:700; font-size:13px;">💬 카카오톡 양식</label>
            <textarea id="editKakao" style="height:140px; font-family:inherit; margin-top:4px; line-height:1.5;"></textarea>
        </div>
        <button class="btn-submit" onclick="saveTemplates()" style="background-color:#1e293b;">💾 편집 내용 브라우저에 저장하기</button>
    </div>
</div>

<div class="toast" id="toast">복사 완료!</div>

        },
        step5: {
            '문자': "[설치 안내] 🚚\n\n안녕하세요, [담당자]님.\n(주)휴먼인텍 김동엽 과장입니다.\n\n[현장명] 전자카드 단말기 설치 일정이 [추가1]로 최종 확정되었습니다.\n\n구체적인 설치 시간은 방문 전날 담당 소장님이 직접 연락드려 상세히 협의 및 조율할 예정입니다.\n\n■ 시공 담당: [추가2]\n\n당일 현장 출입 및 작업 공간 협조를 부탁드립니다. 감사합니다.\n\n📞 문의: 010-6410-0497",
            '카톡': "🚚 **[현장명] 전자카드 단말기 설치 일정 안내**\n\n안녕하세요, [담당자]님!\n(주)휴먼인텍 김동엽 과장입니다.\n\n믿고 맡겨주신 [현장명]의 단말기 설치 일정이 아래와 같이 최종 확정되어 안내해 드립니다. 😊\n\n■ 방문 날짜: [추가1]\n■ 시공 담당: [추가2]\n\n구체적인 설치 시간은 방문 전날 담당 소장님이 미리 전화를 드려 세부 조율 및 협의할 예정입니다.\n\n당일 현장 출입 방법이나 작업 공간 준비 등 특이사항이 있으시면 소장님 혹은 제게 편하게 말씀해 주십시오. 감사합니다.\n\n━━━━\n☎️ 문의: 010-6410-0497 (김동엽 과장)"
        },
        step6: {
            '문자': "[출고 완료] 📦\n\n안녕하세요, [담당자]님.\n(주)휴먼인텍 김동엽 과장입니다.\n\n[현장명] 전자카드 단말기 자재가 금일 정상 출고되었습니다.\n\n본 자재는 현장 개설에 필수적이므로 수령 즉시 분실되지 않게 공무/소장님실에서 안전하게 보관해 주시기 바랍니다.\n\n■ 배송 수단: [추가1]\n■ 송장 번호: [추가2]\n\n도착 후 파손 여부를 체크해 주시고 특이사항 발생 시 즉시 연락 주십시오.\n\n📞 문의: 010-6410-0497",
            '카톡': "📦 **[현장명] 단말기 자재 출고 및 송장 안내**\n\n안녕하세요, [담당자]님!\n(주)휴먼인텍 김동엽 과장입니다.\n\n[현장명]에 도입될 전자카드 단말기 자재가 오늘 안전하게 패키징되어 정상 출고되었습니다! 🎉\n\n■ 배송 정보: [추가1]\n■ 송장 번호: [추가2]\n\n대형 현장의 경우 자재가 타 물품과 섞여 분실되는 경우가 많습니다. 박스 겉면에 '전자카드 단말기 자재'로 명시되어 있으니, 수령하시는 대로 공무실이나 소장실에서 안전하게 확보 부탁드립니다. 도착 시 이상이 있다면 언제든 톡 남겨주세요!\n\n━━━━\n☎️ 문의: 010-6410-0497 (김동엽 과장)"
        }
    };

    let currentTemplates = JSON.parse(localStorage.getItem('ht_final_sms_templates')) || defaultTemplates;

    function switchPage(page) {
        if(page === 'generator') {
            document.getElementById('generatorPage').style.display = 'block';
            document.getElementById('settingsPage').style.display = 'none';
            document.getElementById('navGen').classList.add('active');
            document.getElementById('navSet').classList.remove('active');
            renderSituationGrid();
        } else {
            document.getElementById('generatorPage').style.display = 'none';
            document.getElementById('settingsPage').style.display = 'block';
            document.getElementById('navGen').classList.remove('active');
            document.getElementById('navSet').classList.add('active');
            loadTemplateToEdit();
        }
    }

    function renderSituationGrid() {
        const gridEl = document.getElementById('situationGrid');
        gridEl.innerHTML = "";
        situations.forEach(sit => {
            const card = document.createElement('div');
            card.className = `situation-card ${sit.id === selectedStep ? 'active' : ''}`;
            card.onclick = () => selectStep(sit.id, card);
            card.innerHTML = `<h4>${sit.title}</h4><p>${sit.desc}</p>`;
            gridEl.appendChild(card);
        });
    }

    const selectEditEl = document.getElementById('editStepSelect');
    situations.forEach(sit => {
        const opt = document.createElement('option');
        opt.value = sit.id;
        opt.innerText = sit.title;
        selectEditEl.appendChild(opt);
    });

    function selectChannel(channel, el) {
        selectedChannel = channel;
        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        
        const banner = document.getElementById('infoBanner');
        if ((selectedStep === 'step1' || selectedStep === 'step2' || selectedStep === 'step3' || selectedStep === 'step4') && channel === '이메일') {
            banner.innerText = "⚠️ 안내: 이 상황은 불필요한 중복을 피해 문자/카톡 발송을 강력 권장합니다.";
            banner.className = "notice-banner danger";
        } else {
            banner.innerText = channel === '문자' ? "ⓘ 90바이트가 넘으면 장문(LMS)으로 전환되어 발송 비용이 달라질 수 있습니다." : "ⓘ 채널별 가이드라인에 맞춘 문구입니다.";
            banner.className = "notice-banner";
        }
        generateMessage();
    }

    function selectSegment(type, el) {
        selectedType = type;
        document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        generateMessage();
    }

    function selectStep(stepId, el) {
        selectedStep = stepId;
        document.querySelectorAll('.situation-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        updateExtraFields();
        selectChannel(selectedChannel, document.querySelector('.channel-card.active'));
    }

    function updateExtraFields() {
        const box = document.getElementById('extraInfoBox');
        if (selectedStep === 'step5') {
            box.style.display = 'block';
            let optionsHtml = supervisors.map(s => `<option value="${s.name} (${s.phone})">${s.name} (${s.phone})</option>`).join('');
            box.innerHTML = `
                <div class="form-group">
                    <label>방문 날짜 선택 (달력)</label>
                    <input type="date" id="extra1" onchange="generateMessage()">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>현장 담당 소장님 선택</label>
                    <select id="extra2" onchange="generateMessage()">${optionsHtml}</select>
                </div>`;
        } else if (selectedStep === 'step6') {
            box.style.display = 'block';
            box.innerHTML = `
                <div class="form-group">
                    <label>배송 수단 (수정 가능)</label>
                    <input type="text" id="extra1" value="우체국택배" oninput="generateMessage()">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>우체국 송장번호</label>
                    <input type="text" id="extra2" placeholder="예) 1234567890123" oninput="generateMessage()">
                </div>`;
        } else {
            box.style.display = 'none';
        }
        generateMessage();
    }

    function generateMessage() {
        // 공란 예외 필터링 로직 작동
        let cName = document.getElementById('clientName').value.trim();
        if(!cName) {
            cName = "담당자";
        }
        
        let sName = document.getElementById('siteName').value.trim();
        if(sName) {
            sName = sName + " "; // 현장명이 채워져 있을 때만 뒤에 공백 가미
        }

        const ex1El = document.getElementById('extra1');
        const ex2El = document.getElementById('extra2');
        let ex1 = ex1El ? ex1El.value : "";
        let ex2 = ex2El ? ex2El.value : "";

        // date 타입 데이터 보기 좋게 파싱 (YYYY-MM-DD -> M월 D일)
        if (selectedStep === 'step5' && ex1) {
            const dateParts = ex1.split('-');
            if(dateParts.length === 3) {
                ex1 = parseInt(dateParts[1]) + "월 " + parseInt(dateParts[2]) + "일";
            }
        }

        let baseTemplate = "";
        if(selectedChannel === '이메일') {
            baseTemplate = `업무 협조 안내\n\n안녕하십니까, ${cName}님.\n(주)휴먼인텍 김동엽 과장입니다.\n\n문의하신 내용과 관련하여 안내 말씀 전해드립니다.\n\n■ 계약 형태: [유형]\n■ 주요 정보: [추가1] / [추가2]\n\n상세 내용은 유선 혹은 메시지로 안내해 드린 바와 같사오니 확인 부탁드립니다. 감사합니다.`;
        } else {
            baseTemplate = currentTemplates[selectedStep][selectedChannel];
        }

        let finalText = baseTemplate
            .replace(/\[담당자\]/g, cName)
            .replace(/\[현장명\]/g, sName)
            .replace(/\[유형\]/g, selectedType)
            .replace(/\[추가1\]/g, ex1 || "[정보 입력 필요]")
            .replace(/\[추가2\]/g, ex2 || "[정보 입력 필요]");

        document.getElementById('resultArea').value = finalText;
        calculateBytes(finalText);
    }

    function calculateBytes(str) {
        let byteCount = 0;
        for (let i = 0; i < str.length; i++) {
            let charCode = str.charCodeAt(i);
            if (charCode > 127) { byteCount += 2; } else { byteCount += 1; }
        }
        const counterEl = document.getElementById('byteCounter');
        if (selectedChannel === '문자') {
            counterEl.innerText = `${byteCount} / 90 Byte ${byteCount > 90 ? '(LMS 장문 전환)' : '(SMS 단문)'}`;
            if(byteCount > 90) counterEl.className = "byte-badge warning";
            else counterEl.className = "byte-badge";
        } else {
            counterEl.innerText = `${str.length}자 입력됨 (${selectedChannel})`;
            counterEl.className = "byte-badge";
        }
    }

    function saveInputs() {
        localStorage.setItem('ht_saved_cname', document.getElementById('clientName').value);
        localStorage.setItem('ht_saved_sname', document.getElementById('siteName').value);
        generateMessage();
    }

    function loadSavedInputs() {
        if(localStorage.getItem('ht_saved_cname')) document.getElementById('clientName').value = localStorage.getItem('ht_saved_cname');
        if(localStorage.getItem('ht_saved_sname')) document.getElementById('siteName').value = localStorage.getItem('ht_saved_sname');
    }

    function loadTemplateToEdit() {
        const step = document.getElementById('editStepSelect').value;
        document.getElementById('editSms').value = currentTemplates[step]['문자'];
        document.getElementById('editKakao').value = currentTemplates[step]['카톡'];
    }

    function saveTemplates() {
        const step = document.getElementById('editStepSelect').value;
        currentTemplates[step]['문자'] = document.getElementById('editSms').value;
        currentTemplates[step]['카톡'] = document.getElementById('editKakao').value;
        
        localStorage.setItem('ht_final_sms_templates', JSON.stringify(currentTemplates));
        
        const toast = document.getElementById('toast');
        toast.innerText = "💾 변경 양식이 안전하게 브라우저에 백업되었습니다!";
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1800);
    }

    function copyText() {
        const area = document.getElementById('resultArea');
        if(!area.value) return;
        area.select();
        document.execCommand('copy');
        const toast = document.getElementById('toast');
        toast.innerText = "📋 클립보드에 깔끔하게 복사되었습니다!";
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1500);
    }

    renderSituationGrid();
    loadSavedInputs();
    updateExtraFields();
</script>
</body>
</html>
